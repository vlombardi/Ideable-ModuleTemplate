networks:
  broker_network:
    driver: bridge
  timescale_network:
    driver: bridge
  ideable_network:
    external: true

# All persistent and tmp data for services is now rooted under DATA_FOLDER env var

# This Docker Compose file uses environment variables from .env file
# For version management, update the VERSIONS section in .env

services:

  ###############
  #   Database  #
  ###############
  database:
    env_file:
      - .env
    # TimescaleDB - Time-series database based on PostgreSQL
    # Version: ${TIMESCALEDB_VERSION}
    image: timescale/timescaledb:${TIMESCALEDB_VERSION}
    container_name: ${APP_SLUG}-database
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - timescale_network
      - ideable_network
    volumes:
      - timescale_data_v4:/var/lib/postgresql/data
      - ./database/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  hostapp-db-bootstrap:
    env_file:
      - .env
    image: postgres:16-alpine
    container_name: ${APP_SLUG}-hostapp-db-bootstrap
    command:
      - /bin/sh
      - -c
      - |
        set -e
        until PGPASSWORD="${POSTGRES_PASSWORD}" pg_isready -h database -p 5432 -U "${POSTGRES_USER}" -d "${POSTGRES_DB}"; do
          sleep 2
        done

        PGPASSWORD="${POSTGRES_PASSWORD}" psql -v ON_ERROR_STOP=1 -h database -p 5432 -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -f /module/datamodel.sql

        authentik_db_exists=$(PGPASSWORD="${POSTGRES_PASSWORD}" psql -tA -h database -p 5432 -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c "SELECT 1 FROM pg_database WHERE datname = '${AUTHENTIK_POSTGRES_DB}' LIMIT 1;")
        if [ "$$authentik_db_exists" != "1" ]; then
          PGPASSWORD="${POSTGRES_PASSWORD}" psql -v ON_ERROR_STOP=1 -h database -p 5432 -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c "CREATE DATABASE \"${AUTHENTIK_POSTGRES_DB}\";"
        fi
    volumes:
      - ./database/initdb/datamodel.sql:/module/datamodel.sql:ro
    restart: "no"
    networks:
      - timescale_network
      - ideable_network
    depends_on:
      database:
        condition: service_healthy

  ###############
  #   Backend   #
  ###############
  backend:
    env_file:
      - .env
    image: ${APP_SLUG}/hostapp-backend:latest
    container_name: ${APP_SLUG}-backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - POSTGRES_HOST=${AUTHENTIK_POSTGRES_HOST}
      - POSTGRES_PORT=${AUTHENTIK_POSTGRES_PORT}
      - AUTHENTIK_JWKS_URL=http://authentik-server:9000/application/o/${APP_SLUG}/jwks/
      - AUTHENTIK_API_URL=${AUTHENTIK_INTERNAL_URL}/api/v3
      - AUTHENTIK_API_TOKEN=${AUTHENTIK_BOOTSTRAP_TOKEN}
    volumes:
      - authentik_shared:/shared:ro
    networks:
      - timescale_network
      - ideable_network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8001/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=false"

  ####################
  #     Frontend     #
  ####################
  frontend:
    env_file:
      - .env
    image: ${APP_SLUG}/hostapp-frontend:latest
    container_name: ${APP_SLUG}-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-router.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend-router.entrypoints=websecure"
      - "traefik.http.routers.frontend-router.tls=true"
      - "traefik.http.routers.frontend-router.tls.certresolver=le"
      - "traefik.http.services.frontend-service.loadbalancer.server.port=80"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
      - VITE_OIDC_AUTHORITY=${VITE_OIDC_AUTHORITY}
      - VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID}
      - VITE_OIDC_REDIRECT_URI=${VITE_OIDC_REDIRECT_URI}
      - VITE_OIDC_POST_LOGOUT_REDIRECT_URI=${VITE_OIDC_POST_LOGOUT_REDIRECT_URI}
      - VITE_APP_TITLE=${VITE_APP_TITLE}
    volumes:
      - ./config/modules_menu_mapping.json:/usr/share/nginx/html/modules_menu_mapping.json:ro
      - ./config/module-registry.json:/usr/share/nginx/html/module-registry.json:ro
      - ./config/favicon.png:/usr/share/nginx/html/favicon.png:ro
      - ./config/login_bg.png:/usr/share/nginx/html/login_bg.png:ro
    networks:
      - timescale_network
      - ideable_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://127.0.0.1:80" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ####################
  #    Authentik     #
  ####################
  authentik-server:
    env_file:
      - .env
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION}
    container_name: ${APP_SLUG}-authentik-server
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: ${AUTHENTIK_POSTGRES_HOST}
      AUTHENTIK_POSTGRESQL__PORT: ${AUTHENTIK_POSTGRES_PORT}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_LISTEN__HTTP: 0.0.0.0:9000
      AUTHENTIK_LOG_LEVEL: info
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
      # Environment variables for blueprint substitution
      EXTERNAL_BASE_HOST: ${EXTERNAL_BASE_HOST}
      APP_NAME: ${APP_NAME}
    volumes:
      # Mount blueprints directory for automatic configuration
      - ./authentik/blueprints:/blueprints/custom:ro
    networks:
      - timescale_network
      - ideable_network
    ports:
      - "${AUTHENTIK_PORT_HTTP:-9000}:9000"
      - "${AUTHENTIK_PORT_HTTPS:-9443}:9443"
    depends_on:
      hostapp-db-bootstrap:
        condition: service_completed_successfully

  authentik-bootstrap:
    env_file:
      - .env
    image: python:3.11-alpine
    container_name: ${APP_SLUG}-authentik-bootstrap
    working_dir: /bootstrap
    command: 
      - /bin/sh
      - -c
      - |
        pip install --quiet requests && python bootstrap_authentik.py
    volumes:
      - ./authentik/bootstrap_authentik.py:/bootstrap/bootstrap_authentik.py:ro
      - ./authentik:/bootstrap/assets:ro
      - ./config:/bootstrap/config:ro
      - authentik_shared:/shared
    networks:
      - timescale_network
      - ideable_network
    depends_on:
      authentik-server:
        condition: service_started
    environment:
      AUTHENTIK_URL: "${AUTHENTIK_INTERNAL_URL}"
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}

      # Configurazione applicazione
      APP_NAME: ${APP_NAME}
      APP_SLUG: ${APP_SLUG}
      APP_URL: https://${EXTERNAL_BASE_HOST}
      APP_CALLBACK_URL: https://${EXTERNAL_BASE_HOST}/auth/callback
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}

  authentik-worker:
    env_file:
      - .env
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION}
    container_name: ${APP_SLUG}-authentik-worker
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: ${AUTHENTIK_POSTGRES_HOST}
      AUTHENTIK_POSTGRESQL__PORT: ${AUTHENTIK_POSTGRES_PORT}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_LOG_LEVEL: info
    networks:
      - timescale_network
      - ideable_network
    user: root
    depends_on:
      hostapp-db-bootstrap:
        condition: service_completed_successfully

  ####################
  #     Traefik       #
  ####################
  traefik:
    env_file:
      - .env
    image: ${APP_SLUG}/hostapp-traefik:latest
    container_name: ${APP_SLUG}-traefik
    command:
      - "--configfile=/etc/traefik/traefik.yml"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    user: root
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml.template:/etc/traefik/dynamic.yml.template:ro
    networks:
      - timescale_network
      - ideable_network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  timescale_data_v4:
    name: hostapp_timescale_data_v4
  authentik_shared:
  authentik:
